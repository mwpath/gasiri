      --bnz-ink-dim:  #5b6b86;   /* 보조 텍스트 */

    #h-service-banners .h-filter-wrap{ text-align: center; margin-bottom: 48px; }
    #h-service-banners .h-filter{

      border-radius: 50px;

      transition: background .25s ease, color .25s ease;

    #h-service-banners .h-filter-btn:hover:not(.is-active){ color: var(--bnz-blue); }
    #h-service-banners .h-filter-btn.is-active{ background: var(--bnz-blue); color: #fff; }

    }
 
    /* 카드 */
    #h-service-banners .h-banner{
      position: relative;
      min-height: 440px;
      border-radius: 20px;
      overflow: hidden;
 
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      text-align: left;
 
      color: #fff;
      box-shadow: 0 14px 34px rgba(16,40,90,.12);
      transition: transform .45s ease, box-shadow .45s ease, opacity .45s ease;
 
      cursor: pointer;
      outline: none;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
 
    /* 이미지 레이어 */
    #h-service-banners .h-banner::before{
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--h-bg);
      background-size: cover;
      background-position: center;
      transform: scale(1);
      transition: transform 600ms cubic-bezier(.2,.8,.2,1);
      will-change: transform;
      z-index: 0;
    }
 
    /* 블루 듀오톤 오버레이 */
    #h-service-banners .h-banner::after{
      content: "";
      position: absolute;
      inset: 0;
      background:
      linear-gradient(180deg, rgba(11, 26, 74, 0.22) 0%, rgba(11, 26, 74, 0.50) 52%, rgba(8, 20, 58, 0.90) 100%), linear-gradient(0deg, rgb(0 0 0 / 30%) 0%, rgb(255 255 255 / 30%) 100%);
      pointer-events: none;
      z-index: 1;
    }
 
    /* 번호 */
    #h-service-banners .h-num{
      position: absolute;
      top: 26px;
      left: 26px;
      z-index: 4;
      font-size: 34px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 1px;
      color: #fff;
    }
    #h-service-banners .h-num::after{
      content: "";
      display: block;
      width: 26px;
      height: 2px;
      background: var(--bnz-card-acc);
      margin-top: 10px;
    }
 
    /* 콘텐츠 */
    #h-service-banners .h-banner-content{
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 26px;
    }
    #h-service-banners .h-dummy-title{
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
      line-height: 1.3;
      word-break: keep-all;
      color: #fff;
    }
    #h-service-banners .h-cat{
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--bnz-card-acc);
      margin-bottom: 14px;
    }
    #h-service-banners .h-banner-text{
      font-size: 14px;
      color: rgba(255,255,255,.88);
      line-height: 1.6;
      word-break: keep-all;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
    }
    #h-service-banners .h-more{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .3px;
      color: var(--bnz-card-acc);
    }
    #h-service-banners .h-more .arrow{ transition: transform .3s; }
 
    @media (hover:hover){
      #h-service-banners .h-banner:hover{
        transform: translateY(-4px);
        box-shadow: 0 22px 46px rgba(28,78,216,.26);
      }
      #h-service-banners .h-banner:hover::before{ transform: scale(1.08); }
      #h-service-banners .h-banner:hover .h-more .arrow{ transform: translateX(4px); }
    }
    #h-service-banners .h-banner:focus-visible{
      box-shadow: 0 0 0 3px rgba(28,78,216,.45);
    }
 
    /* ── 더 보기 버튼 ── */
    #h-service-banners .h-more-wrap{ text-align: center; margin-top: 48px; }
    #h-service-banners .h-load-more{
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 56px;
      border-radius: 50px;
      border: 1.5px solid var(--bnz-blue);
      background: #fff;
      color: var(--bnz-blue);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .25s ease, color .25s ease, box-shadow .25s ease;
    }
    #h-service-banners .h-load-more:hover{
      background: var(--bnz-blue);
      color: #fff;
      box-shadow: 0 12px 26px rgba(28,78,216,.28);
    }
    #h-service-banners .h-load-more .lm-arrow{ font-size: 11px; }
    #h-service-banners .h-load-more[hidden]{ display: none; }
 
    /* 배너별 이미지 */
    #h-service-banners .banner-1{ --h-bg: url('./img/b03.jpg'); }
   #h-service-banners .banner-2{ --h-bg: url('./img/2-4.jpg'); }
    #h-service-banners .banner-3{ --h-bg: url('https://images.unsplash.com/photo-1466611653911-95081537e5b7?q=80&w=1000&auto=format&fit=crop'); }
    #h-service-banners .banner-4{ --h-bg: url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?q=80&w=1000&auto=format&fit=crop'); }
    #h-service-banners .banner-5{ --h-bg: url('https://images.unsplash.com/photo-1509391366360-fe5bb58583bb?q=80&w=1000&auto=format&fit=crop'); }
    #h-service-banners .banner-6{ --h-bg: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1000&auto=format&fit=crop'); }
 
    /* ── 반응형 ── */
    @media (max-width: 980px){
      #h-service-banners .h-banner-wrapper{ grid-template-columns: repeat(2, 1fr); }
      #h-service-banners .h-main-title{ font-size: 26px; }
      #h-service-banners .h-dummy-title{ font-size: 22px; }
    }
    @media (max-width: 600px){
      #h-service-banners .h-banner-wrapper{ grid-template-columns: 1fr; }
      #h-service-banners .h-banner{ min-height: 360px; }
      #h-service-banners .h-banner-text{ font-size: 15px; }
      #h-service-banners .h-filter-btn{ padding: 9px 16px; font-size: 13px; }
      #h-service-banners .h-load-more{ padding: 14px 44px; }
    }
 
    @media (prefers-reduced-motion: reduce){
      #h-service-banners .h-banner,
      #h-service-banners .h-banner::before,
      #h-service-banners .h-banner::after,
      #h-service-banners .h-more .arrow{
        transition: none !important;
      }
    }
  </style>
 
  <script>
    (function() {
      var root = document.getElementById('h-service-banners');
      if(!root) return;
 
      var STEP = 12; /* ✅ 처음 노출 개수 = 클릭당 추가 노출 개수 */
 
      var filterBtns = root.querySelectorAll('.h-filter-btn');
      var cards = Array.prototype.slice.call(root.querySelectorAll('.h-banner'));
      var moreBtn = root.querySelector('#h-load-more-btn');
 
      var currentFilter = 'all';
      var shown = STEP;
 
      function matches(card){
        return currentFilter === 'all' || card.getAttribute('data-category') === currentFilter;
      }
 
      function render(){
        var matchedCount = 0;
        cards.forEach(function(card){
          if(matches(card)){
            card.style.display = (matchedCount < shown) ? '' : 'none';
            matchedCount++;
          } else {
            card.style.display = 'none';
          }
        });
        if(moreBtn){ moreBtn.hidden = !(matchedCount > shown); }
      }
 
      filterBtns.forEach(function(btn){
        btn.addEventListener('click', function(){
          filterBtns.forEach(function(x){
            x.classList.remove('is-active');
            x.setAttribute('aria-selected','false');
          });
          btn.classList.add('is-active');
          btn.setAttribute('aria-selected','true');
 
          currentFilter = btn.getAttribute('data-filter');
          shown = STEP;        /* 필터 바꾸면 다시 처음부터 */
          render();
        });
      });
 
      if(moreBtn){
        moreBtn.addEventListener('click', function(){
          shown += STEP;       /* 클릭할 때마다 STEP개씩 더 노출 */
          render();
        });
      }
 
      render();
    })();
  </script>

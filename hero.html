<section id="nwHero" aria-label="Norwegian Wood Hero">
  <style>
    /* ================= Scope: #nwHero only ================= */
    #nwHero{
      --ink:#ffffff; --muted:rgba(255,255,255,.88); --accent:#c7d66b;
      --shadow:0 16px 50px rgba(0,0,0,.25);
      --slideDur:8000ms; /* 자동전환 + 게이지 시간 */
      font-family:Pretendard,"Noto Sans KR",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      position:relative; overflow:hidden; color:var(--ink);
    }

    /* ===== 슬라이드 ===== */
    #nwHero .slides{position:relative; width:100%; height:100vh;}
    #nwHero .slide{position:absolute; inset:0; opacity:0; transition:opacity 900ms ease;}
    #nwHero .slide.active{opacity:1; z-index:1;}

    #nwHero .slide::before{
      content:""; position:absolute; inset:0; z-index:0;
      background-size:120% 120%; background-repeat:no-repeat; background-position:left center;
      animation:nwPan var(--slideDur) linear infinite;
    }
    #nwHero .slide[data-img="sea"]::before{background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920&auto=format&fit=crop');}
    #nwHero .slide[data-img="forest"]::before{background-image:url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?q=80&w=1920&auto=format&fit=crop');}

    @keyframes nwPan{from{background-position:left center;} to{background-position:right center;}}

    /* ===== 비네트 ===== */
    #nwHero .vignette{position:absolute; inset:0; z-index:2; pointer-events:none;}
    #nwHero .vignette::before{content:""; position:absolute; inset:0; background:radial-gradient(120% 100% at 20% 60%, rgba(0,0,0,.45) 0%, rgba(0,0,0,.25) 45%, rgba(0,0,0,.08) 70%, rgba(0,0,0,0) 100%);}    
    #nwHero .vignette::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.08) 40%, rgba(0,0,0,0) 60%);} 

    /* ===== 텍스트 ===== */
    #nwHero .content{position:absolute; left:8%; top:50%; transform:translateY(-50%); z-index:3; max-width:min(780px, 75vw);}    
    #nwHero .eyebrow{display:block; font-size:1rem; letter-spacing:.2px; color:var(--muted); margin-bottom:14px; opacity:0; transform:translateX(-30px); animation:textFade 1s ease forwards .3s;}
    #nwHero .title{font-size:3.4rem; font-weight:800; line-height:1.35; word-break:keep-all; text-wrap:balance; text-shadow:0 2px 6px rgba(0,0,0,.25), 0 1px 0 rgba(0,0,0,.35); opacity:0; transform:translateX(-40px); animation:textFade 1.2s ease forwards .6s;}
    @keyframes textFade{to{opacity:1; transform:translateX(0);}}

    /* ===== 컨트롤 버튼 ===== */
    #nwHero .controls{position:absolute; bottom:42px; left:40px; z-index:4; display:flex; gap:9px;}
    #nwHero .btn{width:46px; height:46px; border-radius:50%; border:1px solid rgba(255,255,255,.45); background:rgba(255,255,255,.06); color:#fff; font-size:1.15rem; backdrop-filter:saturate(110%) blur(2px);}
    #nwHero .btn:hover{background:rgba(255,255,255,.18);} 

    /* ===== 게이지 ===== */
    #nwHero .gaugeWrap{position:absolute;left: 160px;right: 40px;bottom: 62px; height:2px; background:rgba(255,255,255,.35); z-index:4; overflow:hidden;}
    #nwHero .gauge{height:100%; width:0%; background:#fff; animation:nwGauge var(--slideDur) linear infinite;}
    @keyframes nwGauge{from{width:0%;} to{width:100%;}}

    /* ===== Scroll Down (텍스트만) ===== */
    #nwHero .scrollCue{
      position:absolute; right:40px; bottom:96px; z-index:4;
      font-size:.72rem; writing-mode:vertical-rl; text-orientation:mixed; letter-spacing:.6px;
      color:#fff; cursor:pointer; font-weight:500;
    }
    #nwHero .scrollCue span{display:inline-block; animation:scrollText 2.2s ease-in-out infinite;}
    @keyframes scrollText{0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);}}

    /* 반응형 */
    @media (max-width:1024px){#nwHero .title{font-size:3rem;}}
    @media (max-width:768px){
      #nwHero .title{font-size:2rem;}
      #nwHero .eyebrow{font-size:.95rem;}
      #nwHero .controls{left:18px; bottom:22px;}
      #nwHero .gaugeWrap{left: 140px;right: 88px;bottom: 42px;}
      #nwHero .scrollCue{right:18px; bottom:38px; font-size:.65rem;}
    }
  </style>

  <!-- Slides -->
  <div class="slides">
    <div class="slide active" data-img="forest"></div>
    <div class="slide" data-img="sea"></div>
  </div>

  <div class="vignette" aria-hidden="true"></div>

  <!-- Text -->
  <div class="content">
    <span class="eyebrow">Norwegian Wood</span>
    <div class="title">숲과 들, 바다 공해없는<br>자연을 소비자와 함께 나누는 가치</div>
  </div>

  <!-- Controls + Gauge -->
  <div class="controls">
    <button class="btn prev" aria-label="이전 슬라이드">←</button>
    <button class="btn next" aria-label="다음 슬라이드">→</button>
  </div>
  <div class="gaugeWrap"><div class="gauge"></div></div>

  <!-- Scroll Down Cue -->
  <div class="scrollCue"><span>Scroll Down</span></div>

  <script>
    (function(){
      const root = document.querySelector('#nwHero');
      const slides = root.querySelectorAll('.slide');
      const prevBtn = root.querySelector('.prev');
      const nextBtn = root.querySelector('.next');
      const gauge = root.querySelector('.gauge');
      const DUR = 8000;
      let i = 0, timer;

      function show(n){
        i = (n + slides.length) % slides.length;
        slides.forEach((s,idx)=>{
          s.classList.toggle('active', idx===i);
        });
        gauge.style.animation = 'none';
        void gauge.offsetWidth;
        gauge.style.animation = null;
      }
      function next(){ show(i+1); }
      function prev(){ show(i-1); }

      function play(){ timer = setInterval(next, DUR); }
      function reset(){ clearInterval(timer); play(); }

      prevBtn.addEventListener('click', ()=>{ prev(); reset(); });
      nextBtn.addEventListener('click', ()=>{ next(); reset(); });
      play();
    })();
  </script>
</section>

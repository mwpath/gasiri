<section id="gallerySection" aria-label="Gallery Filter + Lightbox">
  <style>
    /* ================= Scope: #gallerySection only ================= */
    #gallerySection{
      --accent:#d6a100; --ink:#222; --muted:#606b74; --bg:#fafafa;
      --radius:14px; --shadow:0 6px 20px rgba(0,0,0,.08);
      --t:380ms; --e:cubic-bezier(.22,.61,.36,1);
      font-family:Pretendard,"Noto Sans KR",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg); padding:80px 20px; color:var(--ink);
    }
    #gallerySection .wrap{max-width:1280px;margin:0 auto;text-align:center}

    /* ===== Section Header ===== */
    #gallerySection .section-header{
      margin:0 auto 28px;
      display:flex; flex-direction:column; align-items:center; gap:8px;
    }
    #gallerySection .section-header .eyebrow{
      font-size:12px; letter-spacing:.14em; text-transform:uppercase;
      color:var(--muted); background:#fff; border-radius:999px; padding:6px 10px;
      box-shadow:var(--shadow);
    }
    #gallerySection .section-header .title{
      font-size:34px; line-height:1.2; font-weight:700; letter-spacing:-0.02em;
    }
    #gallerySection .section-header .desc{
      max-width:760px; color:var(--muted); font-size:15px; line-height:1.6;
    }

    /* ===== Filter Buttons ===== */
    #gallerySection .filter-buttons{display:inline-flex;flex-wrap:wrap;gap:10px;margin:30px 0 38px;justify-content:center}
    #gallerySection .filter-buttons button{
      border:0; background:#fff; color:var(--ink); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:10px 16px; font-size:15px; cursor:pointer;
      transition:transform var(--t) var(--e), background var(--t) var(--e), color var(--t) var(--e)
    }
    #gallerySection .filter-buttons button:hover{transform:translateY(-2px)}
    #gallerySection .filter-buttons button.active{background:var(--accent); color:#fff; transform:translateY(-2px)}

    /* ===== Grid ===== */
    #gallerySection .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }
    #gallerySection .item{
      position:relative; overflow:hidden; border-radius:var(--radius);
      box-shadow:var(--shadow); background:#fff;
      aspect-ratio:1/1; cursor:pointer;
      opacity:1; transform:scale(1);
      transition:opacity var(--t) var(--e), transform var(--t) var(--e);
    }
    #gallerySection .item.hide{display:none;}
    #gallerySection .item img{
      width:100%; height:100%; object-fit:cover; display:block;
      transition:transform var(--t) var(--e), filter var(--t) var(--e);
    }
    #gallerySection .item:hover img{transform:scale(1.05); filter:brightness(.9)}
    #gallerySection .item::after{
      content:attr(data-category); position:absolute; right:12px; bottom:12px;
      background:rgba(0,0,0,.55); color:#fff; padding:6px 10px; border-radius:12px;
      font-size:12px; opacity:0; transition:opacity var(--t) var(--e)
    }
    #gallerySection .item:hover::after{opacity:1}

    /* ===== Lightbox ===== */
    #gallerySection .lightbox{
      position:fixed; inset:0; display:none; place-items:center; z-index:9999;
      background:rgba(0,0,0,.9);
    }
    #gallerySection .lightbox.open{display:grid; animation:fadeIn .28s var(--e)}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    #gallerySection .lightbox img{
      max-width:92vw; max-height:84vh; border-radius:14px;
      box-shadow:0 20px 70px rgba(0,0,0,.45);
      user-select:none; -webkit-user-drag:none;
      transition:transform .35s var(--e);
    }
    #gallerySection .lightbox img:active{transform:scale(.995)}

    /* Lightbox Buttons */
    #gallerySection .glx-btn{
      position:absolute; border:0; cursor:pointer; color:#fff;
      background:rgba(255,255,255,.14); backdrop-filter:blur(8px);
      padding:12px 14px; border-radius:14px; transition:.25s;
    }
    #gallerySection .glx-btn:hover{background:rgba(255,255,255,.25)}
    #gallerySection .glx-close{top:22px; right:22px}
    #gallerySection .glx-prev, #gallerySection .glx-next{top:50%; transform:translateY(-50%)}
    #gallerySection .glx-prev{left:22px}
    #gallerySection .glx-next{right:22px}

    @media (max-width:640px){
      #gallerySection .title{font-size:26px}
      #gallerySection .filter-buttons{gap:6px}
      #gallerySection .filter-buttons button{font-size:14px;padding:8px 14px}
    }
  </style>

  <div class="wrap">
    <!-- ===== Section Header ===== -->
    <header class="section-header">
      <span class="eyebrow">Gallery</span>
      <h2 class="title">숲속 프로그램 이미지 갤러리</h2>
      <p class="desc">Walks, Forest Tea, Trainings, Trails 카테고리별로 사진을 확인하고, 클릭하면 전체 화면에서 감상할 수 있습니다.</p>
    </header>

    <!-- Filter -->
    <div class="filter-buttons">
      <button class="active" data-filter="all">All</button>
      <button data-filter="walks">Walks</button>
      <button data-filter="forest-tea">Forest Tea</button>
      <button data-filter="trainings">Trainings</button>
      <button data-filter="trails">Trails</button>
    </div>

    <!-- Grid -->
    <div class="grid">
      <div class="item" data-category="walks"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" alt="walk"></div>
      <div class="item" data-category="forest-tea"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=800" alt="forest tea"></div>
      <div class="item" data-category="trainings"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" alt="training"></div>
      <div class="item" data-category="trails"><img src="https://images.unsplash.com/photo-1482192596544-9eb780fc7f66?q=80&w=800" alt="trail"></div>

      <div class="item" data-category="walks"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=800" alt="walk"></div>
      <div class="item" data-category="forest-tea"><img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80&w=800" alt="forest tea"></div>
      <div class="item" data-category="trainings"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800" alt="training"></div>
      <div class="item" data-category="trails"><img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?q=80&w=800" alt="trail"></div>

      <div class="item" data-category="walks"><img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=800" alt="walk"></div>
      <div class="item" data-category="forest-tea"><img src="https://images.unsplash.com/photo-1455218873509-8097305ee378?q=80&w=800" alt="forest tea"></div>
      <div class="item" data-category="trainings"><img src="https://images.unsplash.com/photo-1533636721434-0e2d61030955?q=80&w=800" alt="training"></div>
      <div class="item" data-category="trails"><img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=800" alt="trail"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" aria-hidden="true" role="dialog">
    <button type="button" class="glx-btn glx-close" aria-label="Close">✕</button>
    <button type="button" class="glx-btn glx-prev" aria-label="Previous">◀</button>
    <img alt="preview">
    <button type="button" class="glx-btn glx-next" aria-label="Next">▶</button>
  </div>

  <script>
    (function(){
      const root = document.querySelector('#gallerySection');
      const buttons = root.querySelectorAll('.filter-buttons button');
      const items = Array.from(root.querySelectorAll('.grid .item'));

      // FLIP 애니메이션
      function flipAnimate(list, mutate){
        const first = new Map();
        list.forEach(el => { if(el.offsetParent !== null) first.set(el, el.getBoundingClientRect()); });
        mutate();
        const last = new Map();
        list.forEach(el => { if(el.offsetParent !== null) last.set(el, el.getBoundingClientRect()); });
        list.forEach(el => {
          const f = first.get(el), l = last.get(el);
          if(!l) return;
          if(!f){
            el.animate([{opacity:0, transform:'scale(.96)'},{opacity:1, transform:'scale(1)'}],
                       {duration:380, easing:'cubic-bezier(.22,.61,.36,1)'});
            return;
          }
          const dx = f.left - l.left;
          const dy = f.top - l.top;
          if (dx||dy){
            el.animate([{transform:`translate(${dx}px,${dy}px)`},{transform:'translate(0,0)'}],
                       {duration:420, easing:'cubic-bezier(.22,.61,.36,1)'});
          }
        });
      }

      // 필터링
      buttons.forEach(btn=>{
        btn.addEventListener('click', ()=>{
          if(btn.classList.contains('active')) return;
          buttons.forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          const f = btn.getAttribute('data-filter');
          flipAnimate(items, ()=>{
            items.forEach(card=>{
              const show=(f==='all')||(card.getAttribute('data-category')===f);
              card.classList.toggle('hide', !show);
            });
          });
        });
      });

      // 라이트박스
      const lb=root.querySelector('.lightbox');
      const lbImg=lb.querySelector('img');
      const btnPrev=lb.querySelector('.glx-prev');
      const btnNext=lb.querySelector('.glx-next');
      const btnClose=lb.querySelector('.glx-close');
      let currentIndex=0;

      function visibleItems(){ return items.filter(el=>!el.classList.contains('hide')); }
      function openAt(index){
        const vis=visibleItems(); if(!vis.length) return;
        currentIndex=(index+vis.length)%vis.length;
        lbImg.src=vis[currentIndex].querySelector('img').src.replace('w=800','w=1600');
        lb.classList.add('open'); lb.setAttribute('aria-hidden','false');
      }
      function closeLB(){ lb.classList.remove('open'); lb.setAttribute('aria-hidden','true'); }
      function step(n){ const vis=visibleItems(); if(!vis.length) return;
        currentIndex=(currentIndex+n+vis.length)%vis.length;
        lbImg.src=vis[currentIndex].querySelector('img').src.replace('w=800','w=1600');
      }

      items.forEach(el=>{
        el.addEventListener('click',()=> openAt(visibleItems().indexOf(el)));
        el.tabIndex=0;
        el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openAt(visibleItems().indexOf(el));}});
      });
      btnClose.addEventListener('click',closeLB);
      btnPrev.addEventListener('click',()=>step(-1));
      btnNext.addEventListener('click',()=>step(1));
      lb.addEventListener('click',e=>{if(e.target===lb) closeLB();});
      document.addEventListener('keydown',e=>{
        if(!lb.classList.contains('open')) return;
        if(e.key==='Escape') closeLB();
        if(e.key==='ArrowRight') step(1);
        if(e.key==='ArrowLeft') step(-1);
      });

      // 스와이프 이동
      let startX=0,isDown=false;
      lb.addEventListener('pointerdown',e=>{isDown=true;startX=e.clientX;});
      lb.addEventListener('pointerup',e=>{
        if(!isDown)return;isDown=false;
        const dx=e.clientX-startX;
        if(Math.abs(dx)>50){ dx<0?step(1):step(-1); }
      });
      lb.addEventListener('pointercancel',()=>{isDown=false;});
    })();
  </script>
</section>
